name: Pipeline do Blog Multicriterio

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # ETAPA 1: INTEGRAÇÃO CONTÍNUA (CI) - VALIDAÇÃO
  # ==========================================
  validacao-e-testes:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Baixando o codigo no robo
        uses: actions/checkout@v4

      - name: 2. Configurando o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 3. Instalar dependências (npm install)
        run: npm install

      - name: 4. Rodar lint (npm run lint)
        run: npm run lint

      - name: 5. Rodar testes (npm run test)
        run: npm run test --if-present

      - name: 6. Rodar build (npm run build)
        run: npm run build

  # ==========================================
  # ETAPA 2: ENTREGA CONTÍNUA (CD) - DEPLOY
  # ==========================================
  deploy-na-vercel:
    runs-on: ubuntu-latest
    needs: validacao-e-testes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 1. Baixando o codigo no robo
        uses: actions/checkout@v4

      - name: 2. Instalando a ferramenta da Vercel
        run: npm install -g vercel

      - name: 3. Conectando com a Vercel e preparando ambiente
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 4. Fazendo o Build final dentro da Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 5. Colocando o site oficialmente no ar
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

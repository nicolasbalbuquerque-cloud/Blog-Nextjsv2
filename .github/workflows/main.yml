name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      #  CORREÇÃO: Usando apenas o npm ci limpo e correto para ambientes de CI/CD
      - name: Install dependencies
        run: npm ci

      #  CORREÇÃO: Apenas UMA etapa de lint executada
      - name: Run Lint
        run: npm run lint

      # Executa a nossa suíte de testes que vamos atualizar
      - name: Run Tests
        run: npm test

      # Executa o build de produção oficial
      - name: Build Application
        run: npm run build